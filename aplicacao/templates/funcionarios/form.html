{% extends "base.html" %}
{% block title %}{{ titulo }} — Mudanças até o Fim do Mundo{% endblock %}
{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('dashboard') }}">Dashboard</a>
  <span class="sep">/</span>
  <a href="{{ url_for('listar_funcionarios') }}">Funcionários</a>
  <span class="sep">/</span>
  <span class="current">{{ titulo }}</span>
</div>
<div class="page-header">
  <h1>{{ titulo }}</h1>
</div>

<div class="card">
  <form method="POST" action="{{ action }}">
    <div class="form-row">
      <div class="form-group">
        <label for="nome_completo">Nome Completo</label>
        <input type="text" id="nome_completo" name="nome_completo" class="form-control" value="{{ func.nome_completo if func else '' }}" required>
      </div>
      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" class="form-control" value="{{ func.cpf if func else '' }}" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="rg">RG</label>
        <input type="text" id="rg" name="rg" class="form-control" value="{{ func.rg if func else '' }}" required>
      </div>
      <div class="form-group">
        <label for="tipo">Tipo/Função</label>
        <select id="tipo" name="tipo" class="form-control" required>
          <option value="">Selecione...</option>
          <option value="Motorista" {% if func and func.tipo == 'Motorista' %}selected{% endif %}>Motorista</option>
          <option value="Guincho" {% if func and func.tipo == 'Guincho' %}selected{% endif %}>Guincho</option>
          <option value="Gerente de Mudanças" {% if func and func.tipo == 'Gerente de Mudanças' %}selected{% endif %}>Gerente de Mudanças</option>
          <option value="Ajudante" {% if func and func.tipo == 'Ajudante' %}selected{% endif %}>Ajudante</option>
          <option value="Montador" {% if func and func.tipo == 'Montador' %}selected{% endif %}>Montador</option>
          <option value="Embalador" {% if func and func.tipo == 'Embalador' %}selected{% endif %}>Embalador</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" name="endereco" class="form-control" value="{{ func.endereco if func else '' }}" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="salario">Salário</label>
        <input type="number" step="0.01" id="salario" name="salario" class="form-control" value="{{ func.salario if func else '' }}" required>
      </div>
      <div class="form-group">
        <label for="empresas">Empresas (separadas por vírgula)</label>
        <input type="text" id="empresas" name="empresas" class="form-control" value="{{ func.empresas | join(', ') if func else '' }}" required>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn">Salvar</button>
      <a href="{{ url_for('listar_funcionarios') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
