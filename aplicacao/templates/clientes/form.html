{% extends "base.html" %}
{% block title %}{{ titulo }} — Mudanças até o Fim do Mundo{% endblock %}
{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('dashboard') }}">Dashboard</a>
  <span class="sep">/</span>
  <a href="{{ url_for('listar_clientes') }}">Clientes</a>
  <span class="sep">/</span>
  <span class="current">{{ titulo }}</span>
</div>
<div class="page-header">
  <h1>{{ titulo }}</h1>
</div>

<div class="card">
  <form method="POST" action="{{ action }}">
    <div class="form-row">
      <div class="form-group">
        <label for="codigo">Código</label>
        <input type="number" id="codigo" name="codigo" class="form-control" value="{{ cliente.codigo if cliente else '' }}" required>
      </div>
      <div class="form-group">
        <label for="nome_completo">Nome Completo</label>
        <input type="text" id="nome_completo" name="nome_completo" class="form-control" value="{{ cliente.nome_completo if cliente else '' }}" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" class="form-control" value="{{ cliente.cpf if cliente else '' }}" required>
      </div>
      <div class="form-group">
        <label for="rg">RG</label>
        <input type="text" id="rg" name="rg" class="form-control" value="{{ cliente.rg if cliente else '' }}" required>
      </div>
    </div>
    <div class="form-group">
      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" name="endereco" class="form-control" value="{{ cliente.endereco if cliente else '' }}" required>
    </div>
    <div class="form-group">
      <label for="telefones">Telefones (separados por vírgula)</label>
      <input type="text" id="telefones" name="telefones" class="form-control" value="{{ cliente.telefones | join(', ') if cliente else '' }}" required>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn">Salvar</button>
      <a href="{{ url_for('listar_clientes') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
