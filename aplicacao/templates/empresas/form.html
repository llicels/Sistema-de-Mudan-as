{% extends "base.html" %}
{% block title %}{{ titulo }} — Mudanças até o Fim do Mundo{% endblock %}
{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('dashboard') }}">Dashboard</a>
  <span class="sep">/</span>
  <a href="{{ url_for('listar_empresas') }}">Empresas</a>
  <span class="sep">/</span>
  <span class="current">{{ titulo }}</span>
</div>
<div class="page-header">
  <h1>{{ titulo }}</h1>
</div>

<div class="card">
  <form method="POST" action="{{ action }}">
    <div class="form-group">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" class="form-control" value="{{ empresa.nome if empresa else '' }}" required>
    </div>
    <div class="form-group">
      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" name="endereco" class="form-control" value="{{ empresa.endereco if empresa else '' }}" required>
    </div>
    <div class="form-group">
      <label for="telefones">Telefones (separados por vírgula)</label>
      <input type="text" id="telefones" name="telefones" class="form-control" value="{{ empresa.telefones | join(', ') if empresa else '' }}" required>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn">Salvar</button>
      <a href="{{ url_for('listar_empresas') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
