{% extends "base.html" %}
{% block title %}Histograma — Pagamentos por Cidade — Mudanças até o Fim do Mundo{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Histograma: Pagamentos por Cidade</h1>
  <div class="page-actions">
    <a href="{{ url_for('relatorios') }}" class="btn btn-secondary">Voltar</a>
  </div>
</div>

<div class="card">
  <div class="chart-container">
    <canvas id="chartPagamentos"></canvas>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const ctx = document.getElementById('chartPagamentos').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: {{ dados.labels | tojson }},
    datasets: [{
      label: 'Valor Total (R$)',
      data: {{ dados.valores | tojson }},
      backgroundColor: '#7A9E8A',
      borderColor: '#2C2C2C',
      borderWidth: 1,
      borderRadius: 0
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false }
    },
    scales: {
      y: {
        beginAtZero: true,
        ticks: {
          color: '#2C2C2C',
          callback: function(value) { return 'R$ ' + value.toFixed(2); }
        },
        grid: { color: '#D4CFC3' }
      },
      x: {
        ticks: { color: '#2C2C2C' },
        grid: { display: false }
      }
    }
  }
});
</script>
{% endblock %}
