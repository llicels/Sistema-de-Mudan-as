{% extends "base.html" %}
{% block title %}{{ titulo }} — Mudanças até o Fim do Mundo{% endblock %}
{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('dashboard') }}">Dashboard</a>
  <span class="sep">/</span>
  <a href="{{ url_for('listar_oferecem') }}">Oferecimentos</a>
  <span class="sep">/</span>
  <span class="current">{{ titulo }}</span>
</div>
<div class="page-header">
  <h1>{{ titulo }}</h1>
</div>

<div class="card">
  <form method="POST" action="{{ action }}">
    <div class="form-group">
      <label for="id_empresa">Empresa</label>
      <select id="id_empresa" name="id_empresa" class="form-control" required {% if item %}disabled{% endif %}>
        <option value="">Selecione...</option>
        {% for e in empresas %}
        <option value="{{ e.id_empresa }}" {% if item and item.id_empresa == e.id_empresa %}selected{% endif %}>{{ e.nome }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="nome_servico">Serviço</label>
      <select id="nome_servico" name="nome_servico" class="form-control" required {% if item %}disabled{% endif %}>
        <option value="">Selecione...</option>
        {% for s in servicos %}
        <option value="{{ s.nome_servico }}" {% if item and item.nome_servico == s.nome_servico %}selected{% endif %}>{{ s.nome_servico }} ({{ s.tipo_servico }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="nome_cidade">Cidade</label>
      <select id="nome_cidade" name="nome_cidade" class="form-control" required {% if item %}disabled{% endif %}>
        <option value="">Selecione...</option>
        {% for c in cidades %}
        <option value="{{ c.nome_cidade }}" {% if item and item.nome_cidade == c.nome_cidade %}selected{% endif %}>{{ c.nome_cidade }}/{{ c.estado }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="preco_hora">Preço por Hora (R$)</label>
      <input type="number" step="0.01" id="preco_hora" name="preco_hora" class="form-control"
             value="{{ item.preco_hora if item else '' }}" required>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn">Salvar</button>
      <a href="{{ url_for('listar_oferecem') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
