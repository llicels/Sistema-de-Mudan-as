{% extends "base.html" %}
{% block title %}{{ titulo }} — Mudanças até o Fim do Mundo{% endblock %}
{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('dashboard') }}">Dashboard</a>
  <span class="sep">/</span>
  <a href="{{ url_for('listar_cidades') }}">Cidades</a>
  <span class="sep">/</span>
  <span class="current">{{ titulo }}</span>
</div>
<div class="page-header">
  <h1>{{ titulo }}</h1>
</div>

<div class="card">
  <form method="POST" action="{{ action }}">
    <div class="form-row">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" class="form-control" value="{{ cidade.nome_cidade if cidade else '' }}" required>
      </div>
      <div class="form-group">
        <label for="estado">Estado</label>
        <input type="text" id="estado" name="estado" class="form-control" maxlength="2" value="{{ cidade.estado if cidade else '' }}" required>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn">Salvar</button>
      <a href="{{ url_for('listar_cidades') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
